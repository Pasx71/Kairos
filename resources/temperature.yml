# ========================================== #
#         KAIROS TEMPERATURE SYSTEM          #
# ========================================== #
# Note: Temperature operates on a scale from 0.0 to 100.0.
# 50.0 is comfortable. 10.0 is freezing. 90.0 is overheating.

enabled: true

settings:
  # The default resting temperature of a player in a neutral environment.
  base_temperature: 50.0
  
  # How much the player's core temperature shifts every 2 seconds (40 ticks) toward their target temperature.
  transition_speed: 2.0

# --- EXTERNAL INTEGRATIONS ---
# (Handled by TemperatureManager.java)
integration:
  temperature_modifier:
    # A PlaceholderAPI placeholder for magical heat resistance or custom racial traits.
    placeholder: "none"
    # Example: If a player is a "Frost Demon" and this returns -15.0, their base temp will be colder.
    scale: 1.0

# --- CLIMATE MODIFIERS ---
# These values ADD or SUBTRACT from the player's base_temperature based on their surroundings.
modifiers:
  
  biomes:
    # Added if standing in a biome from the "hot" group in biomes.yml
    hot: 25.0
    # Subtracted if standing in a biome from the "cold" group in biomes.yml
    cold: 25.0
    
  seasons:
    # Added if the SeasonManager says it is currently Summer
    summer: 20.0
    # Subtracted if the SeasonManager says it is currently Winter
    winter: 20.0
    
  environment:
    # Subtracted if it is nighttime (Time > 13000 and Time < 23000)
    night: 10.0
    # Subtracted if the player is standing out in the rain without sky cover
    rain: 15.0
    
  armor:
    # Added FOR EACH piece of leather armor worn (Full set = +20 Heat)
    # Essential for surviving Blizzards and Winter nights!
    leather_piece: 5.0 
  
  # Scans a 5x4x5 radius around the player for heat sources or cooling blocks.
  # The maximum heat a player can get from blocks is capped between -30.0 and +40.0.
  blocks:
    # Amount of heat added PER BLOCK found in the hot_materials list
    hot_value: 8.0
    # Amount of heat subtracted PER BLOCK found in the cold_materials list
    cold_value: 3.0
    
    hot_materials:
      - CAMPFIRE
      - SOUL_CAMPFIRE
      - FIRE
      - SOUL_FIRE
      - LAVA
      - MAGMA_BLOCK
      - LAVA_CAULDRON
      
    cold_materials:
      - WATER
      - ICE
      - PACKED_ICE
      - BLUE_ICE
      - POWDER_SNOW

# --- TEMPERATURE EFFECTS ---
# Define what happens when a player reaches the extreme ends of the temperature scale.
effects:
  
  freezing:
    # At or below this temp, the player gets Slowness and builds up Vanilla Freeze Ticks.
    threshold: 10.0
    # Once max freeze ticks are reached, they take this much damage every 2 seconds.
    damage: 1.0
    
  overheating:
    # At or above this temp, the player gets Mining Fatigue and Nausea.
    threshold: 90.0
    # The random chance (per 2 seconds) that the player will take heat-stroke damage.
    damage_chance: 0.2
    # The amount of true damage taken when a heat-stroke procs.
    damage: 1.0