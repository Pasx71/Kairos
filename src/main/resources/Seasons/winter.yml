# ==========================================
#         KAIROS - WINTER SETTINGS
# ==========================================

# How many in-game days this season lasts.
# Variance adds or subtracts random days to make it unpredictable (e.g., 30 +/- 5 days).
duration: 30
variance: 5

# --- TIME & DAYLIGHT ---
time:
  # Multipliers for day/night speed. (Handled by TimeCycleTask.java)
  # 1.0 is normal speed. 1.5 means it goes 50% faster. 0.8 means it's 20% slower.
  day_speed_multiplier: 1.5   # Winter days are very short, the sun sets fast
  night_speed_multiplier: 0.8 # Winter nights are long, cold, and grueling

# --- WEATHER FORCING ---
weather_forcing:
  enabled: true
  # Chance to completely block rain/snow when the world tries to start a storm
  block_rain_chance: 0.05
  # Chance to block the weather from clearing (Creates Endless Blizzards/Snowstorms)
  block_clear_chance: 0.65

# --- FARMING & CROP GROWTH ---
farming:
  # Master toggle for Seasonal Crop restrictions (If false, vanilla crop mechanics apply)
  enabled: true
  
  # Base boost/penalty to passive crop growth ticks (Handled by CropGrowthListener.java)
  growth_boost: 0.0
  growth_penalty: 0.85 # 85% of the time a crop tries to grow, it will fail due to the cold
  
  # Percentage of saplings that die when trying to grow into a tree
  sapling_death_rate: 0.75
  
  # Crops that will refuse to grow during this season UNLESS inside a Greenhouse
  # (A Greenhouse is defined in config.yml as having a roof above it and high block-light levels).
  # Note: "Hot" biomes (Deserts) bypass this in Winter/Spring, and "Wet" biomes (Jungles) bypass this entirely!
  banned_crops:
    - "WHEAT"
    - "CARROTS"
    - "POTATOES"
    - "BEETROOTS"
    - "MELON_STEM"
    - "PUMPKIN_STEM"
    - "SWEET_BERRY_BUSH"

  # (Handled by SeasonalHarvestListener.java)
  enable_double_harvest: false
  double_harvest_chance: 0.0
  
  # Integration: Allow players to increase their harvest yield using a skill plugin!
  # Note: This affects HARVESTING (BlockBreakEvent), not passive chunk growth.
  modifier:
    placeholder: "%aureliumskills_farming%" 
    scale: 0.005 # Each level of farming adds 0.5% chance to double-drop crops

# --- FISHING & LOOT ---
fishing:
  # Master toggle for Seasonal Fishing mechanics
  enabled: true
  
  # 2.0 = Fish take twice as long to bite because the water is freezing/sluggish.
  wait_multiplier: 2.0 
  
  # The base chance to hook something from the custom loot table instead of a vanilla fish.
  custom_loot_chance: 0.25
  
  # "REPLACE" will delete the vanilla fish. "ADDITIVE" will drop the custom loot alongside the vanilla fish.
  mode: "ADDITIVE"
  
  # Integration: Allow players to increase custom loot chance using a skill plugin!
  modifier:
    placeholder: "%mcmmo_level_fishing%"
    scale: 0.001 # Every 100 mcMMO fishing levels adds 10% chance to pull custom loot
    
  loot:
    ice_block:
      weight: 40.0
      item: "ICE"
      min: 1
      max: 3
    packed_ice:
      weight: 15.0
      item: "PACKED_ICE"
      min: 1
      max: 1
    leather_boots:
      weight: 5.0
      item: "LEATHER_BOOTS"
      min: 1
      max: 1
    wind_staff_relic:
      weight: 1.0
      item: "wind_staff" # Pulls directly from CustomItemRegistry!
      min: 1
      max: 1

# --- MOB SPAWNING ---
spawning:
  # Massive chance to cancel natural animal spawns (Wildlife hides or hibernates)
  wildlife_spawn_penalty: 0.85
  
  # Hardcoded season features (Handled by SeasonalMobSpawnListener.java)
  hibernate_bees: true
  cancel_spiders: true # Spiders freeze to death and don't spawn in Winter
  
  # "REPLACE" will delete the vanilla mob. "ADDITIVE" will spawn the custom mob alongside it.
  mode: "REPLACE"
  
  # Replaces natural spawns with Custom Entities (from CustomEntityType registry)
  # Format: VANILLA_MOB_TO_REPLACE: { "NEW_MOB": chance }
  mob_replacements:
    STRAY:
      ancient_skeleton: 0.20  # 20% chance a Stray is actually an Ancient Skeleton
    ZOMBIE:
      ghoul: 0.10             # 10% chance a Zombie is a Ghoul crawling from the frozen dirt
      lost_soul: 0.05         # 5% chance a Zombie is a hovering Lost Soul
    SKELETON:
      skeleton_knight: 0.05   # 5% chance a Skeleton spawns mounted as a Skeleton Knight
    HUSK:
      psyco: 0.05             # 5% chance a Husk is a door-breaking, teleporting Psyco

# --- FOOD SPOILAGE ---
spoilage:
  # Disabled in Winter! The ambient freezing temperatures preserve raw meat naturally.
  # (Handled by FoodSpoilageTask.java)
  enabled: false
  chance_per_interval: 0.0
  modifier:
    placeholder: "none"
    scale: 0.0

# --- SEASONAL BIOME EFFECTS ---
effects:
  # Unique to Winter: Exposed water source blocks have a chance to turn to ice during storms or at night.
  # (Handled natively by WinterFreezeEffect.java)
  water_freeze_chance: 0.25
  
  # Note: Mud Slowness is natively checked via config.yml for Spring/Autumn.
  # Note: Snow layering is natively handled by WinterSnowEffect.java and requires no config.