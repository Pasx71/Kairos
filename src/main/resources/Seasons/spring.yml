# ==========================================
#         KAIROS - SPRING SETTINGS
# ==========================================

# How many in-game days this season lasts.
# Variance adds or subtracts random days to make it unpredictable (e.g., 30 +/- 5 days).
duration: 30
variance: 5

# --- TIME & DAYLIGHT ---
time:
  # Multipliers for day/night speed. (Handled by TimeCycleTask.java)
  # 1.0 is normal Vanilla speed.
  day_speed_multiplier: 1.0
  night_speed_multiplier: 1.0

# --- WEATHER FORCING ---
weather_forcing:
  # Spring is known for heavy rainfall and thunderstorms!
  enabled: true
  
  # Chance to completely block rain/snow when the world tries to start a storm
  block_rain_chance: 0.0
  
  # Chance to block the weather from clearing (Creates prolonged Spring Showers)
  block_clear_chance: 0.35

# --- FARMING & CROP GROWTH ---
farming:
  # Master toggle for Seasonal Crop restrictions
  enabled: true
  
  # Base boost/penalty to passive crop growth ticks (Handled by CropGrowthListener.java)
  # 15% chance for a crop to receive a double-tick when it grows naturally!
  growth_boost: 0.15 
  growth_penalty: 0.0 # No penalty, life flourishes in Spring!
  
  # Percentage of saplings that die when trying to grow into a tree
  sapling_death_rate: 0.0
  
  # Bees are highly active in Spring! If a Bee is within 15 blocks of a crop, 
  # it has a massive chance to instantly advance its growth stage.
  bee_growth_boost: 0.50
  
  # Crops that will refuse to grow during this season UNLESS inside a Greenhouse.
  # Spring is the optimal growing season, so this list is empty by default.
  banned_crops: