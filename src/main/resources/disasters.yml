    level_1: 15.0
    level_2: 20.0
    level_3: 25.0
    level_4: 30.0
    level_5: 35.0
    level_6: 40.0
  pull_force:
    level_1: 0.05
    level_2: 0.07
    level_3: 0.09
    level_4: 0.11
    level_5: 0.13
    level_6: 0.15

