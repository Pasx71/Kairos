death_parade:
  enabled: true
  send_warning: true
  chance: 0.0 # Naturally disabled (0.0). Exists exclusively as a scheduled event!
  max_level: 5
  allowed_biomes:[]
  blacklisted_biomes:[]
  
  # DYNAMIC SCHEDULES: Will trigger exactly on Day 15 of Winter automatically!
  # Controlled by SeasonManager.java -> checkDayCycle()
  scheduled_triggers:
    - season: "WINTER"
      day: 15
      level: 4
      
  commands_on_start:
    - "broadcast &8[&4&l!&8] &cThe Death Parade has arrived in %world% to claim souls!"
  commands_on_end:
    - "broadcast &8[&4&l!&8] &a%player% has survived the Death Parade!"
    - "eco give %player% 1000"
    
  bossbar:
    title: "&5&lDeath Parade"
    color: PURPLE
    end_message: "&aThe parade has moved on. You survived!"
  max_mobs:
    level_1: 15
    level_2: 20
    level_3: 30
    level_4: 40
    level_5: 50
  mobs:
    ZOMBIE: 20
    SKELETON: 20
    skeleton_knight: 10
    zombie_knight: 10
    ghoul: 10
    psyco: 10
    scarecrow: 10
    vampire: 5
    lost_soul: 5