# ========================================== #
#           KAIROS DISASTERS CONFIG          #
# ========================================== #
# Note: Scheduled events (like the Death Parade) can be attached 
# to ANY disaster using the `scheduled_triggers` list!

# ------------------------------------------ #
# WEATHER DISASTERS
# ------------------------------------------ #

extreme_winds:
  enabled: true
  send_warning: true
  delay_ticks: 40
  chance: 1.0
  min_height: 50
  max_level: 6
  allowed_biomes:[]
  blacklisted_biomes:[]
  commands_on_start:
    - "broadcast &8[&bWeather&8] &7A severe windstorm has begun in &e%world%&7!"
  commands_on_end:
    - "broadcast &8[&bWeather&8] &7The windstorm in &e%world% &7has passed."

# (These variables are explicitly pulled by ExtremeWinds.java without the underscore)
extremewinds:
  start_delay: 40
  max_particles: 100
  block_break_force: 1.0
  volume: 1.0
  wind_height: 64 # Players below Y=64 will not be affected by the wind
  push_entities: true
  particle: CLOUD
  time:
    level_1: 120
    level_2: 150
    level_3: 200
    level_4: 250
    level_5: 300
    level_6: 350
  force:
    level_1: 1.0
    level_2: 1.2
    level_3: 1.5
    level_4: 1.8
    level_5: 2.2
    level_6: 2.5

blizzard:
  enabled: true
  send_warning: true
  delay_ticks: 40
  chance: 1.0
  min_height: 50
  max_level: 6
  allowed_biomes: # Only spawns in Winter biomes (or if it's Winter via SeasonManager)
    - SNOWY_PLAINS
    - SNOWY_TAIGA
    - ICE_SPIKES
    - FROZEN_OCEAN
    - GROVE
    - SNOWY_SLOPES
    - JAGGED_PEAKS
    - FROZEN_PEAKS
  blacklisted_biomes:[]
  commands_on_start: []
  commands_on_end:[]
  start_delay: 40
  damage: 2.0
  min_freezing_height: 50
  time:
    level_1: 120
    level_2: 150
    level_3: 200
    level_4: 250
    level_5: 300
    level_6: 350

sandstorm:
  enabled: true
  send_warning: true
  delay_ticks: 40
  chance: 1.0
  min_height: 50
  max_level: 6
  allowed_biomes: 
    - DESERT
    - BADLANDS
    - ERODED_BADLANDS
    - WOODED_BADLANDS
  blacklisted_biomes: []
  commands_on_start:[]
  commands_on_end:[]
  start_delay: 40
  time:
    level_1: 120
    level_2: 150
    level_3: 200
    level_4: 250
    level_5: 300
    level_6: 350

hurricane:
  enabled: true
  send_warning: true
  delay_ticks: 40
  chance: 1.0
  min_height: 50
  max_level: 6
  allowed_biomes:[]
  blacklisted_biomes: 
    - DESERT
    - BADLANDS
  commands_on_start:
    - "broadcast &8[&1Weather&8] &bA Category %level% Hurricane has struck %world%!"
  commands_on_end:[]
  start_delay: 40
  time:
    level_1: 60
    level_2: 80
    level_3: 100
    level_4: 120
    level_5: 140
    level_6: 180
  wind_force:
    level_1: 0.2
    level_2: 0.25
    level_3: 0.3
    level_4: 0.35
    level_5: 0.4
    level_6: 0.5
  lightning_freq: # Lower is more frequent (1 in X chance per tick)
    level_1: 100
    level_2: 80
    level_3: 60
    level_4: 40
    level_5: 20
    level_6: 10

tornado:
  enabled: true
  send_warning: true
  delay_ticks: 20
  chance: 1.0
  min_height: 50
  max_level: 6
  allowed_biomes: []
  blacklisted_biomes:[]
  commands_on_start: []
  commands_on_end:[]
