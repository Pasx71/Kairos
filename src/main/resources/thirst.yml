# ========================================== #
#           KAIROS THIRST SYSTEM             #
# ========================================== #
# Note: Maximum thirst is always 100.0.
# Thirst drains automatically over time, and is influenced by sprinting and heat.

enabled: true

rates:
  # How much thirst is drained every 3 seconds (60 ticks) while standing still.
  base_drain: 0.5
  
  # How much EXTRA thirst is drained if the player is actively sprinting.
  sprint_drain_penalty: 0.5
  
  # If the player's core body temperature is above this value, they sweat and dehydrate faster!
  heat_threshold: 75.0 
  # How much EXTRA thirst is drained due to being above the heat_threshold.
  heat_drain_penalty: 1.0

# --- EXTERNAL INTEGRATIONS ---
# (Handled by ThirstManager.java)
integration:
  thirst_resistance:
    # A PlaceholderAPI placeholder representing a player's endurance or stamina.
    placeholder: "%aureliumskills_endurance%"
    # Math: Dehydration Rate = Base Drain - (Placeholder Value * Scale)
    # E.g., if Endurance is level 10, and scale is 0.02, drain rate is reduced by 0.2.
    scale: 0.02

effects:
  thirsty:
    # When thirst drops to or below this value, the player gets Slowness and Mining Fatigue.
    threshold: 20.0
  dehydrated:
    # When thirst reaches 0.0, the player takes this much true damage every 3 seconds and goes blind.
    damage: 1.0

# --- HYDRATION ITEMS ---
# Define how much thirst is restored when a player consumes these items.
# Note: "WATER_BOTTLE" is a special hardcoded key in ThirstManager.java that checks for un-brewed water!
# You can add any Vanilla Material name here (e.g., MILK_BUCKET, POTION, CHORUS_FRUIT).
hydration_items:
  WATER_BOTTLE: 40.0
  MELON_SLICE: 15.0
  APPLE: 5.0
  CARROT: 5.0
  SWEET_BERRIES: 2.0
  GLOW_BERRIES: 2.0
  MUSHROOM_STEW: 20.0
  BEETROOT_SOUP: 20.0
  RABBIT_STEW: 25.0
  MILK_BUCKET: 30.0
  HONEY_BOTTLE: 15.0