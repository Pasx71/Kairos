# ========================================== #
#           KAIROS BIOME GROUPS              #
# ========================================== #
# Define custom biome groups here using valid Spigot Biome Enums. 
# You can reference these groups in seasons.yml, disasters.yml, and temperature.yml!

groups:
  
  # "Hot" biomes completely ignore Winter/Spring crop restrictions.
  # They are uniquely targeted by Summer effects (Hot Sand, Scorching Armor).
  # They are warmer by default in temperature.yml.
  hot:
    - DESERT
    - BADLANDS
    - ERODED_BADLANDS
    - WOODED_BADLANDS
    - SAVANNA
    - SAVANNA_PLATEAU
    - WINDSWEPT_SAVANNA
   # - CHERRY_GROVE # Example addition if you consider it a warm spring biome
  
  # "Cold" biomes only allow standard crop growth during the Summer.
  # They are targeted by Winter Taiga freezing effects.
  # They are colder by default in temperature.yml.
  cold:
    - SNOWY_PLAINS
    - ICE_SPIKES
    - TAIGA
    - SNOWY_TAIGA
    - FROZEN_OCEAN
    - FROZEN_RIVER
    - GROVE
    - SNOWY_SLOPES
    - JAGGED_PEAKS
    - FROZEN_PEAKS
  
  # "Wet" biomes completely ignore ALL seasonal crop restrictions (endless growth).
  # They are targeted heavily by Spring Rain and Mud Slowness.
  wet:
    - JUNGLE
    - BAMBOO_JUNGLE
    - SPARSE_JUNGLE
    - SWAMP
    - MANGROVE_SWAMP
    
  # "Oceanic" biomes are primarily used as conditions for generating oceanic disasters 
  # (like Hurricanes) or blocking terrestrial ones (like Sandstorms).
  oceanic:
    - OCEAN
    - DEEP_OCEAN
    - WARM_OCEAN
    - LUKEWARM_OCEAN
    - COLD_OCEAN
    - DEEP_LUKEWARM_OCEAN
    - DEEP_COLD_OCEAN
    - DEEP_FROZEN_OCEAN
    
  # "Magical" biomes are protected from natural devastation.
  # They completely ignore Winter Snow layering and Winter Water Freezing.
  # You can also add these to your disasters.yml blacklists to keep them pristine.
  magical:
    - MUSHROOM_FIELDS
    - DEEP_DARK
    - LUSH_CAVES